title: LSASS Memory Dump via Procdump
id: bb2b3c4d-5e6f-7a8b-9c0d-1e2f3a4b5c6d
status: stable
description: Detects use of procdump.exe targeting lsass.exe
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    Image|endswith: '\procdump.exe'
    CommandLine|contains: 'lsass'
  condition: selection
level: critical
tags:
  - attack.credential_access
  - attack.t1003.001
